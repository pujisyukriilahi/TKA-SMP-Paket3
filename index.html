<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tryout TKA Matematika SMP 2026 - 75 Menit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-card { cursor: pointer; transition: all 0.2s; border: 2px solid #e5e7eb; position: relative; }
        .option-card:hover { border-color: #3b82f6; background-color: #f0f7ff; }
        .selected { border-color: #2563eb; background-color: #dbeafe; font-weight: bold; }
        .nav-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .nav-unanswered { background-color: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; }
        .nav-answered { background-color: #2563eb; color: white; }
        .nav-current { border-color: #1e3a8a; box-shadow: 0 0 0 2px #bfdbfe; }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        
        /* Styles for Result Breakdown */
        .res-box { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.8rem; font-weight: bold; color: white; }
        .res-correct { background-color: #10b981; }
        .res-wrong { background-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen">

    <div id="main-test-area" class="max-w-6xl mx-auto py-6 px-4 flex flex-col lg:flex-row gap-6">
        
        <!-- Kolom Utama: Soal -->
        <div class="flex-1">
            <!-- Header & Timer -->
            <div class="flex justify-between items-center mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div>
                    <h1 class="text-xl font-bold text-slate-900">Tryout TKA Matematika SMP</h1>
                    <p class="text-sm text-slate-500 font-medium">Paket 3 • 30 Soal • 75 Menit</p>
                </div>
                <div class="flex items-center gap-3 bg-red-50 px-4 py-2 rounded-xl border border-red-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <div id="timer" class="text-2xl font-mono font-black text-red-600 tracking-tighter">75:00</div>
                </div>
            </div>

            <!-- Quiz Card -->
            <div id="quiz-card" class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                <div id="stimulus-container" class="bg-slate-50 p-6 border-b border-slate-100">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">Stimulus Soal</span>
                    </div>
                    <div id="stimulus-content" class="text-slate-700 leading-relaxed italic text-sm md:text-base"></div>
                </div>

                <div class="p-6">
                    <div class="flex items-start gap-4 mb-6">
                        <span id="question-number" class="bg-slate-800 text-white font-bold px-4 py-2 rounded-xl text-lg shadow-md">1</span>
                        <h2 id="question-text" class="text-lg md:text-xl font-semibold text-slate-800 pt-1"></h2>
                    </div>

                    <div id="options-container" class="space-y-3">
                        <!-- Pilihan muncul di sini -->
                    </div>
                </div>

                <!-- Footer Navigation -->
                <div class="p-6 bg-slate-50 flex justify-between items-center border-t border-slate-100">
                    <button id="prev-btn" onclick="changeQuestion(-1)" class="flex items-center gap-2 px-5 py-2.5 font-bold text-slate-600 hover:text-blue-600 disabled:opacity-30 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                        Sebelumnya
                    </button>
                    
                    <button id="next-btn" onclick="changeQuestion(1)" class="flex items-center gap-2 bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                        Selanjutnya
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Kolom Samping: Navigator -->
        <div class="lg:w-80">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 sticky top-6">
                <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                    Navigasi Soal
                </h3>
                
                <div id="nav-grid" class="grid grid-cols-5 gap-2 mb-6">
                    <!-- Tombol nomor soal 1-30 muncul di sini -->
                </div>

                <div class="space-y-2 mb-6 text-xs font-medium text-slate-500 border-t pt-4">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded bg-blue-600"></div>
                        <span>Sudah Dijawab</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded bg-slate-100 border border-slate-200"></div>
                        <span>Belum Dijawab</span>
                    </div>
                </div>

                <button id="final-submit-btn" onclick="checkBeforeSubmit()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-lg hover:bg-emerald-700 shadow-xl shadow-emerald-100 transition-all transform active:scale-95">
                    KIRIM JAWABAN
                </button>
            </div>
        </div>

    </div>

    <!-- Modal Peringatan -->
    <div id="modal-warning" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div class="bg-amber-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">Belum Lengkap!</h3>
            <p id="warning-text" class="text-slate-600 mb-6 font-medium"></p>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-black transition-all">Kembali ke Soal</button>
        </div>
    </div>

    <!-- Screen Hasil -->
    <div id="result-screen" class="hidden min-h-screen bg-slate-100 flex items-center justify-center p-6 py-12">
        <div class="bg-white rounded-3xl shadow-2xl max-w-3xl w-full p-8 md:p-12 border border-slate-200 overflow-hidden relative">
            <div class="text-center">
                <h2 class="text-3xl font-black text-slate-900 mb-2 uppercase tracking-tight italic">Tryout Selesai!</h2>
                <div class="flex flex-col md:flex-row items-center justify-center gap-8 my-8 border-y border-slate-100 py-8">
                    <div class="text-center">
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Skor Akhir</p>
                        <div id="final-score" class="text-8xl font-black text-blue-600 leading-none tracking-tighter">0</div>
                    </div>
                    <div class="h-16 w-px bg-slate-100 hidden md:block"></div>
                    <div class="text-left space-y-2">
                        <div class="flex items-center gap-3">
                            <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                            <span class="text-slate-600 font-medium">Jawaban Benar: <b id="correct-count" class="text-slate-900">0</b></span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="w-3 h-3 rounded-full bg-slate-300"></span>
                            <span class="text-slate-600 font-medium">Total Soal: <b class="text-slate-900">30</b></span>
                        </div>
                        <p id="score-message" class="text-sm text-slate-500 italic pt-2"></p>
                    </div>
                </div>

                <div class="text-left mb-10">
                    <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Detail Jawaban Per Nomor
                    </h3>
                    <div id="result-breakdown" class="flex flex-wrap gap-2 justify-center md:justify-start">
                        <!-- Kotak Benar/Salah muncul di sini -->
                    </div>
                    <div class="mt-4 flex gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-emerald-500"></div> Benar</div>
                        <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-red-500"></div> Salah</div>
                    </div>
                </div>

                <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:shadow-2xl hover:bg-black transition-all transform active:scale-[0.98]">
                    COBA LAGI / ULANGI LATIHAN
                </button>
            </div>
        </div>
    </div>

    <script>
        // DATA SOAL (30 Soal)
        const questions = [
            { type: "mcq", stimulus: "Supermarket: Diskon Rp25rb untuk belanja min Rp200rb. PPN 11% setelah diskon. Rina belanja Rp225rb.", question: "Berapa total uang yang harus dibayar Rina?", options: ["Rp200.000,00", "Rp222.000,00", "Rp224.500,00", "Rp249.750,00"], answer: 1 },
            { type: "checkbox", stimulus: "X = (14² - 4²), Y = (15 x 12), Z = 2² x 3² x 5", question: "Pilih pernyataan yang benar! (Bisa lebih dari satu)", options: ["X dan Y sama besar.", "Ketiga bilangan habis dibagi 60.", "FPB ketiganya adalah 20.", "Z sama dengan Y."], answer: [0, 1, 3] },
            { type: "tf", stimulus: "Skala 1:500.000. Jarak peta 12 cm. Kecepatan 60 km/jam.", question: "Benar atau Salah pernyataan berikut?", options: ["Jarak sebenarnya 60 km.", "Waktu tempuh 1 jam.", "Skala 1:250.000, jarak peta jadi 24 cm."], answer: [true, true, true] },
            { type: "mcq", stimulus: "Campuran cat Ungu (Biru:Merah = 4:3). Butuh 14 liter campuran.", question: "Berapa liter cat Merah yang harus disiapkan?", options: ["6 liter", "8 liter", "10 liter", "12 liter"], answer: 0 },
            { type: "checkbox", stimulus: "50 tamu = 12,5 kg beras. Ingin menjamu 180 orang.", question: "Manakah estimasi yang benar?", options: ["Butuh beras 45 kg.", "Tamu konsumsi 0,25 kg/orang.", "Cukup 4 karung @10kg.", "100 orang butuh 25 kg."], answer: [0, 1, 3] },
            { type: "mcq", stimulus: "Pakan 1.200 ayam cukup 20 hari. Ayam ditambah 300 ekor.", question: "Berapa hari pakan akan habis?", options: ["15 hari", "16 hari", "18 hari", "25 hari"], answer: 1 },
            { type: "tf", stimulus: "Proyek 60 hari oleh 24 pekerja. Hari ke-15 berhenti 9 hari.", question: "Benar atau Salah?", options: ["Sisa waktu efektif 36 hari.", "Hutang kerja 216 unit.", "Tambah 6 pekerja agar tepat waktu."], answer: [true, true, true] },
            { type: "checkbox", stimulus: "Paket A (50rb), Paket B (Gratis, iklan 30s tiap 3 lagu). Andi dengar 300 lagu/bln. 1 jam = 10rb.", question: "Pilih pernyataan logis:", options: ["Waktu iklan B = 50 menit.", "Waktu hilang B = Rp8.333.", "Paket B lebih untung secara finansial.", "Jika 600 lagu, A lebih untung."], answer: [0, 1, 2, 3] },
            { type: "mcq", stimulus: "Halim (09.00) -> Padalarang (30m) -> Berhenti (10m) -> Tegalluar (15m).", question: "Sampai di Tegalluar pukul?", options: ["09.45", "09.55", "10.05", "10.15"], answer: 1 },
            { type: "checkbox", stimulus: "Kendala sinyal: kecepatan setengah selama 10 menit normal perjalanan.", question: "Dampak yang mungkin terjadi:", options: ["Terlambat 10 menit.", "Waktu total > 1 jam.", "Sampai Tegalluar 10.05.", "Rata-rata kecepatan turun."], answer: [0, 1, 2, 3] },
            { type: "tf", stimulus: "Daya 1300 VA (Rp1.444/kWh). Keluarga Budi daya 1300 VA konsumsi 10 kWh/hari.", question: "Tentukan Benar atau Salah!", options: ["Tagihan listrik keluarga Budi selama 30 hari adalah Rp433.200,00.", "Selisih tagihan jika daya 900 VA (Rp1.352) konsumsi sama adalah Rp27.600,00.", "Semakin besar daya (VA), tarif per kWh semakin mahal."], answer: [true, true, true] },
            { type: "mcq", stimulus: "Hasil dari: 3(2x² - 4) - 2(x² - 5)", question: "Bentuk aljabar yang paling sederhana adalah...", options: ["4x² - 2", "4x² - 7", "8x² - 22", "8x² + 2"], answer: 0 },
            { type: "checkbox", stimulus: "Hemat (60rb/12GB), Super (100rb/25GB). Dana 150rb, butuh 35GB.", question: "Kombinasi pembelian yang benar dan masuk anggaran?", options: ["3 Paket Hemat.", "1 Paket Super + 1 Paket Hemat.", "2 Paket Super.", "1 Paket Super + 2 Paket Hemat."], answer: [0, 1] },
            { type: "tf", stimulus: "2 tiket + 1 popcorn = 110rb. 3 tiket + 1 popcorn = 160rb.", question: "Tentukan Benar atau Salah!", options: ["Harga satu tiket bioskop adalah Rp50.000,00.", "Harga satu paket popcorn adalah Rp10.000,00.", "1 tiket dan 1 popcorn total harganya Rp60.000,00."], answer: [true, true, true] },
            { type: "mcq", stimulus: "Mesin Cuci Rp4.000.000. Penyusutan linear Rp300.000/tahun.", question: "Setelah berapa tahun nilai mesin menjadi Rp1.900.000?", options: ["5 tahun", "6 tahun", "7 tahun", "8 tahun"], answer: 2 },
            { type: "mcq", stimulus: "Pola ubin biru: Pola 1=1, Pola 2=4, Pola 3=9...", question: "Jumlah ubin biru pada pola ke-7?", options: ["28", "49", "56", "64"], answer: 1 },
            { type: "tf", stimulus: "Tabungan: 5rb, 8rb, 11rb...", question: "Benar atau Salah mengenai tabungan siswa tersebut!", options: ["Tabungan minggu ke-10 adalah Rp32.000,00.", "Total seluruh tabungan setelah 4 minggu adalah Rp38.000,00.", "Selisih tabungan minggu ke-8 dan minggu ke-5 adalah Rp9.000,00."], answer: [true, true, true] },
            { type: "mcq", stimulus: "Dua rel sejajar dipotong jalan transversal. Sudut rel 1 = 75°.", question: "Berapakah besar sudut dalam sepihak di rel kedua?", options: ["75°", "105°", "115°", "180°"], answer: 1 },
            { type: "tf", stimulus: "Gedung asli 24m difoto jadi 8cm. Tiang lampu asli 6m.", question: "Benar atau Salah!", options: ["Skala pengecilan foto adalah 1 : 300.", "Tinggi tiang lampu pada foto adalah 2 cm.", "Jika foto diperbesar dua kali, tinggi gedung jadi 12 cm."], answer: [true, true, false] },
            { type: "checkbox", stimulus: "Teras: Persegi Panjang (4x3m) + Segitiga (alas 3m, tinggi 2m).", question: "Manakah pernyataan yang benar?", options: ["Luas bagian persegi panjang 12 m².", "Luas bagian segitiga 6 m².", "Luas total teras 15 m².", "Cukup dipasangi 150 ubin ukuran 1 m²."], answer: [0, 2] },
            { type: "mcq", stimulus: "Lantai dapur 3x3m dipasang keramik 30x30cm.", question: "Jumlah minimal keramik yang dibutuhkan?", options: ["90 buah", "100 buah", "300 buah", "900 buah"], answer: 1 },
            { type: "mcq", stimulus: "Kotak paket Balok (50x30x20 cm).", question: "Berapa volume maksimal ruang di dalam kotak tersebut?", options: ["30.000 cm³", "30 liter", "3.000 cm³", "3 liter"], answer: 1 },
            { type: "mcq", stimulus: "Benda K(2, -5) ditranslasikan oleh T(-3, 7).", question: "Posisi akhir benda tersebut adalah...", options: ["(-1, 2)", "(5, 12)", "(-1, -12)", "(5, -2)"], answer: 0 },
            { type: "mcq", stimulus: "Titik L(4, 6) direfleksikan Sumbu-X lalu ke garis y=x.", question: "Koordinat bayangan akhir dari titik L?", options: ["(4, -6)", "(-6, 4)", "(6, 4)", "(6, -4)"], answer: 1 },
            { type: "mcq", stimulus: "Menara Air: Tabung (r=1, t=3) + Kerucut (r=1, t=0.75). π=3.14.", question: "Berapa volume total air maksimal?", options: ["9,42 m³", "10,205 m³", "11,775 m³", "12,56 m³"], answer: 1 },
            { type: "mcq", stimulus: "Harga Saham: Sen: 1200, Sel: 1500, Rab: 1400, Kam: 1600, Jum: 1800.", question: "Kenaikan harga saham paling besar terjadi pada hari...", options: ["Senin ke Selasa", "Selasa ke Rabu", "Rabu ke Kamis", "Kamis ke Jumat"], answer: 0 },
            { type: "checkbox", stimulus: "Total 120 siswa. Olahraga 40%, Seni 30%, Baca 20%, Lain 10%.", question: "Pernyataan yang benar?", options: ["Siswa Olahraga berjumlah 48 orang.", "Selisih Kesenian dan Membaca 12 orang.", "Siswa Membaca berjumlah 20 orang.", "Gabungan Olahraga dan Lainnya 50%."], answer: [0, 1, 3] },
            { type: "mcq", stimulus: "Rata-rata 10 siswa = 75. Salah input: 70 tertulis seharusnya 90.", question: "Berapakah nilai rata-rata yang benar?", options: ["76", "77", "78", "80"], answer: 1 },
            { type: "mcq", stimulus: "Merah 5, Kuning 3, Hijau 2. Ambil 2 tanpa pengembalian. Pertama Merah.", question: "Peluang kelereng kedua adalah Kuning?", options: ["3/10", "3/9", "2/10", "1/3"], answer: 1 },
            { type: "checkbox", stimulus: "Dua dadu dilempar. Mengamati jumlah mata dadu habis dibagi 5.", question: "Pernyataan yang benar?", options: ["Pasangan jumlah 5 ada 4 cara.", "Pasangan jumlah 10 ada 3 cara.", "Total titik sampel adalah 36.", "Peluang muncul jumlah habis dibagi 5 adalah 7/36."], answer: [0, 1, 2, 3] }
        ];

        let currentIdx = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let timeLeft = 75 * 60; // 75 Menit

        // Timer Logic
        const timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            if (timerEl) {
                timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishQuiz();
            }
        }, 1000);

        function initNav() {
            const grid = document.getElementById('nav-grid');
            grid.innerHTML = '';
            for(let i=0; i < questions.length; i++) {
                const btn = document.createElement('div');
                btn.id = `nav-${i}`;
                btn.className = 'nav-btn nav-unanswered';
                btn.innerText = i + 1;
                btn.onclick = () => { currentIdx = i; loadQuestion(); };
                grid.appendChild(btn);
            }
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-number').innerText = currentIdx + 1;
            document.getElementById('stimulus-content').innerText = q.stimulus;
            document.getElementById('question-text').innerText = q.question;
            
            // Update Navigator Colors
            document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
                btn.classList.remove('nav-current');
                if (idx === currentIdx) btn.classList.add('nav-current');
                
                const ans = userAnswers[idx];
                let isAnswered = false;
                if (ans !== null) {
                    if (Array.isArray(ans)) {
                        isAnswered = ans.length > 0 && !ans.includes(null);
                    } else {
                        isAnswered = true;
                    }
                }
                
                if (isAnswered) {
                    btn.classList.remove('nav-unanswered');
                    btn.classList.add('nav-answered');
                } else {
                    btn.classList.remove('nav-answered');
                    btn.classList.add('nav-unanswered');
                }
            });

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            if (q.type === 'mcq') {
                q.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = `option-card p-4 rounded-xl flex items-center gap-3 ${userAnswers[currentIdx] === i ? 'selected shadow-sm' : ''}`;
                    div.innerHTML = `<span class="w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold text-xs">${String.fromCharCode(65 + i)}</span> <span>${opt}</span>`;
                    div.onclick = () => { userAnswers[currentIdx] = i; loadQuestion(); };
                    container.appendChild(div);
                });
            } else if (q.type === 'checkbox') {
                if (!userAnswers[currentIdx]) userAnswers[currentIdx] = [];
                q.options.forEach((opt, i) => {
                    const isSelected = userAnswers[currentIdx].includes(i);
                    const div = document.createElement('div');
                    div.className = `option-card p-4 rounded-xl flex items-center gap-3 ${isSelected ? 'selected shadow-sm' : ''}`;
                    div.innerHTML = `<div class="w-6 h-6 border-2 rounded flex items-center justify-center text-blue-600">${isSelected ? '✓' : ''}</div> <span>${opt}</span>`;
                    div.onclick = () => {
                        const idx = userAnswers[currentIdx].indexOf(i);
                        if (idx > -1) userAnswers[currentIdx].splice(idx, 1);
                        else userAnswers[currentIdx].push(i);
                        loadQuestion();
                    };
                    container.appendChild(div);
                });
            } else if (q.type === 'tf') {
                if (!userAnswers[currentIdx]) userAnswers[currentIdx] = new Array(q.options.length).fill(null);
                const table = document.createElement('div');
                table.className = "space-y-4";
                q.options.forEach((opt, i) => {
                    const row = document.createElement('div');
                    row.className = "flex flex-col md:flex-row md:items-center justify-between p-3 bg-slate-50 rounded-lg border gap-3";
                    row.innerHTML = `
                        <p class="text-sm font-medium flex-1">${opt}</p>
                        <div class="flex gap-2">
                            <button onclick="setTF(${i}, true)" class="flex-1 md:flex-none px-4 py-1.5 rounded-lg font-bold text-xs ${userAnswers[currentIdx][i] === true ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white border text-slate-400'}">BENAR</button>
                            <button onclick="setTF(${i}, false)" class="flex-1 md:flex-none px-4 py-1.5 rounded-lg font-bold text-xs ${userAnswers[currentIdx][i] === false ? 'bg-rose-600 text-white border-rose-600' : 'bg-white border text-slate-400'}">SALAH</button>
                        </div>
                    `;
                    table.appendChild(row);
                });
                container.appendChild(table);
            }

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === questions.length - 1;
        }

        window.setTF = (idx, val) => {
            userAnswers[currentIdx][idx] = val;
            loadQuestion();
        };

        function changeQuestion(step) {
            currentIdx += step;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx >= questions.length) currentIdx = questions.length - 1;
            loadQuestion();
        }

        function checkBeforeSubmit() {
            let incomplete = [];
            questions.forEach((q, idx) => {
                const ans = userAnswers[idx];
                let isComplete = false;
                if (q.type === 'mcq') isComplete = ans !== null;
                else if (q.type === 'checkbox') isComplete = ans && ans.length > 0;
                else if (q.type === 'tf') isComplete = ans && !ans.includes(null);
                
                if (!isComplete) incomplete.push(idx + 1);
            });

            if (incomplete.length > 0) {
                document.getElementById('warning-text').innerText = `Masih ada ${incomplete.length} soal yang belum dijawab: Nomor ${incomplete.join(', ')}. Harap isi semua jawaban sebelum mengirim.`;
                document.getElementById('modal-warning').classList.remove('hidden');
            } else {
                finishQuiz();
            }
        }

        function closeModal() {
            document.getElementById('modal-warning').classList.add('hidden');
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            let correctCount = 0;
            let results = []; // Array of boolean (correct or not)

            questions.forEach((q, i) => {
                const userAns = userAnswers[i];
                let isCorrect = false;
                
                if (q.type === 'mcq' && userAns === q.answer) isCorrect = true;
                if (q.type === 'checkbox' && Array.isArray(userAns) && userAns.sort().join(',') === q.answer.sort().join(',')) isCorrect = true;
                if (q.type === 'tf' && Array.isArray(userAns) && JSON.stringify(userAns) === JSON.stringify(q.answer)) isCorrect = true;
                
                if (isCorrect) correctCount++;
                results.push(isCorrect);
            });

            const finalScore = Math.round((correctCount / questions.length) * 100);
            
            // UI Transition
            document.getElementById('main-test-area').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            // Set Values
            document.getElementById('final-score').innerText = finalScore;
            document.getElementById('correct-count').innerText = correctCount;
            
            // Message based on score
            let msg = "";
            if (finalScore >= 80) msg = "Luar biasa! Kamu sangat menguasai materi TKA.";
            else if (finalScore >= 65) msg = "Kerja bagus! Sedikit lagi kamu mencapai skor sempurna.";
            else msg = "Jangan patah semangat. Teruslah berlatih agar nilai meningkat!";
            document.getElementById('score-message').innerText = msg;

            // Generate Breakdown Grid
            const breakdownGrid = document.getElementById('result-breakdown');
            breakdownGrid.innerHTML = '';
            results.forEach((isCorrect, idx) => {
                const box = document.createElement('div');
                box.className = `res-box ${isCorrect ? 'res-correct' : 'res-wrong'}`;
                box.innerText = idx + 1;
                box.title = isCorrect ? 'Benar' : 'Salah';
                breakdownGrid.appendChild(box);
            });
        }

        // Initialize
        initNav();
        loadQuestion();
    </script>
</body>
</html>
