<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Soal TKA Matematika - Standar Pusmendik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .selected { border-color: #2563eb; background-color: #dbeafe; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-3xl mx-auto py-10 px-4">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-800">Simulasi TKA Matematika</h1>
            <p class="text-gray-600">Sesuai Skema Numerasi Pusmendik (SD/SMP)</p>
        </header>

        <div id="quiz-container" class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
            <div id="question-area">
                <div id="stimulus" class="bg-blue-50 p-4 rounded-lg mb-4 italic text-gray-700 border-l-4 border-blue-500"></div>
                <h2 id="question-text" class="text-xl font-semibold mb-6"></h2>
                
                <div id="options" class="space-y-3">
                    </div>
            </div>

            <div id="result-area" class="hidden text-center">
                <h2 class="text-2xl font-bold mb-2">Latihan Selesai!</h2>
                <p id="score-text" class="text-xl mb-6"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Ulangi Latihan</button>
            </div>

            <div class="mt-8 flex justify-between items-center border-t pt-4">
                <span id="progress" class="text-sm text-gray-500">Soal 1 dari 2</span>
                <button id="next-btn" onclick="nextQuestion()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 disabled:opacity-50">Lanjut</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                stimulus: "Toko 'Maju Jaya' memberikan diskon 25% untuk semua tas. Harga sebuah tas sebelum diskon adalah Rp200.000,00.",
                question: "Berapakah uang yang harus dibayarkan Ibu jika membeli tas tersebut?",
                options: ["Rp150.000", "Rp165.000", "Rp175.000", "Rp180.000"],
                answer: 0
            },
            {
                stimulus: "Sebuah bak mandi berbentuk kubus memiliki panjang rusuk 1 meter. Bak tersebut diisi air hingga penuh.",
                question: "Berapa liter volume air dalam bak mandi tersebut? (1 m³ = 1.000 Liter)",
                options: ["10 Liter", "100 Liter", "1.000 Liter", "10.000 Liter"],
                answer: 2
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let selectedOption = null;

        function loadQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('stimulus').innerText = q.stimulus;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('progress').innerText = `Soal ${currentIdx + 1} dari ${quizData.length}`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = "option-card border-2 p-4 rounded-lg cursor-pointer transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('next-btn').disabled = true;
        }

        function selectOption(index, el) {
            selectedOption = index;
            document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            if (selectedOption === quizData[currentIdx].answer) score++;
            
            currentIdx++;
            if (currentIdx < quizData.length) {
                selectedOption = null;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('progress').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Skor Anda: ${(score / quizData.length) * 100}`;
        }

        loadQuestion();
    </script>
</body>
</html>
